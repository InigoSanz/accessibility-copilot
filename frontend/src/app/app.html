<div class="app-shell">
	<header class="app-topbar">
		<div class="app-topbar__inner">
			<a class="brand" href="/projects" aria-label="Accessibility Copilot home">
				<img src="images/logo.png" alt="Accessibility Copilot" class="brand__logo" />
				<div class="brand__text">
					<strong>Accessibility Copilot</strong>
					<span>Accessibility scanning workspace</span>
				</div>
			</a>

			<nav class="topbar-nav" aria-label="Main navigation">
				<a
					href="/projects"
					[class.topbar-nav__link--active]="isProjectsRouteActive()"
					class="topbar-nav__link"
				>
					Projects
				</a>
				<a
					href="/scans"
					[class.topbar-nav__link--active]="isScansRouteActive()"
					class="topbar-nav__link"
				>
					Scans
				</a>
			</nav>
		</div>
	</header>

	<main class="app-main">
		<router-outlet></router-outlet>
	</main>
</div>
