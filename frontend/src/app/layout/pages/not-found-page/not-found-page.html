<section class="not-found-page page-shell" aria-labelledby="not-found-title" *transloco="let t">
  <header class="page-hero">
    <span class="page-hero__eyebrow">{{ t('notFound.hero.eyebrow') }}</span>
    <h1 id="not-found-title">{{ t('notFound.hero.title') }}</h1>
    <p>{{ t('notFound.hero.description') }}</p>
  </header>

  <article class="surface-card not-found-card">
    <img src="images/logo.png" [attr.alt]="t('app.brand.name')" class="not-found-logo" />

    <div class="not-found-content">
      <h2>{{ t('notFound.content.title') }}</h2>
      <p>{{ t('notFound.content.description') }}</p>

      <div class="not-found-actions">
        <a class="btn btn-primary" routerLink="/projects">{{ t('notFound.actions.projects') }}</a>
        <a class="btn btn-secondary" routerLink="/scans">{{ t('notFound.actions.scans') }}</a>
      </div>
    </div>
  </article>
</section>
