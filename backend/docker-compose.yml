services:
  postgres:
    image: postgres:17
    container_name: accessibility-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-accessibility_copilot}
      POSTGRES_USER: ${POSTGRES_USER:-accessibility}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-accessibility}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-accessibility} -d ${POSTGRES_DB:-accessibility_copilot}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: accessibility-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-accessibility_copilot}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-accessibility}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-accessibility}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:5173}
      SCANNER_SECURITY_ENFORCE_WHITELIST: ${SCANNER_SECURITY_ENFORCE_WHITELIST:-false}
      SCANNER_SECURITY_ALLOWED_DOMAINS: ${SCANNER_SECURITY_ALLOWED_DOMAINS:-}
      SCANNER_SECURITY_BLOCK_PRIVATE_NETWORKS: ${SCANNER_SECURITY_BLOCK_PRIVATE_NETWORKS:-true}
    ports:
      - "8080:8080"

volumes:
  postgres-data:

