spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/accessibility_copilot}
    username: ${SPRING_DATASOURCE_USERNAME:accessibility}
    password: ${SPRING_DATASOURCE_PASSWORD:accessibility}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:5173}

scanner:
  security:
    enforce-whitelist: ${SCANNER_SECURITY_ENFORCE_WHITELIST:false}
    allowed-domains: ${SCANNER_SECURITY_ALLOWED_DOMAINS:}
    block-private-networks: ${SCANNER_SECURITY_BLOCK_PRIVATE_NETWORKS:true}
